resources:
  apps:
    investment_intel_app:
      name: "${bundle.target}-investment-intel"
      description: "AI-powered investment portfolio intelligence"
      source_code_path: ../app

      resources:
        - name: warehouse_id
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: "CAN_USE"
        - name: embedding_model
          serving_endpoint:
            name: databricks-gte-large-en
            permission: "CAN_QUERY"
