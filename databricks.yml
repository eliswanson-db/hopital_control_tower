bundle:
  name: medical_logistics_nba_app
  databricks_cli_version: ">=0.234.*"

include:
  - variables.yml
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: # your workspace URL, e.g. https://my-workspace.cloud.databricks.com/
    variables:
      catalog: # your Unity Catalog name
      schema: med_logistics_nba
      warehouse_id: # your SQL Warehouse ID
      vector_search_endpoint: # your Vector Search endpoint name
      lakebase_instance: # your Lakebase instance name (optional)
      node_type_id: i3.xlarge

  prod:
    mode: production
    workspace:
      host: ${var.workspace_host}
      root_path: ${var.root_path}
    permissions:
      - user_name: ${var.deploying_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.deploying_user}
