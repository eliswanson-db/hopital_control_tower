bundle:
  name: medical_logistics_nba_app
  databricks_cli_version: ">=0.234.*"

sync:
  include:
    - app/app.yaml

include:
  - variables.yml
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fe-vm-vdm-classic-q6xfh3.cloud.databricks.com/ # workspace URL
    variables:
      catalog: eswanson_demo # Unity Catalog name
      schema: med_logistics_nba
      warehouse_id: 3abb59fcfb739e0d # SQL Warehouse ID
      vector_search_endpoint: eswanson_demo_med_logistics_nba_vector_endpoint # Vector Search endpoint name
      node_type_id: i3.xlarge

  prod:
    mode: production
    workspace:
      host: ${var.workspace_host}
      root_path: ${var.root_path}
    permissions:
      - user_name: ${var.deploying_user}
        level: CAN_MANAGE
    run_as:
      user_name: ${var.deploying_user}
